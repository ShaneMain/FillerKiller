name: CI

on:
  push:
    branches: [master]
  pull_request:

# CI only reads the code, builds, and tests — it needs no write access. Pinning
# the token to read-only means a malicious fork PR can't use it to push or
# tamper, now that the repo is public.
permissions:
  contents: read

jobs:
  api:
    name: API (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    env:
      # Compile against the committed .sqlx cache (deterministic); the live DB
      # below is only used to run the `integration`-gated sqlx::test at runtime.
      SQLX_OFFLINE: "true"
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      # Third-party actions are pinned to full commit SHAs (not mutable tags) so
      # a compromised upstream tag can't silently run new code in CI. The
      # trailing comment records the human-readable version each SHA maps to.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          workspaces: api
      - run: cargo build --locked
      - run: cargo clippy --all-targets --features integration -- -D warnings
      - run: cargo test --features integration
      - uses: taiki-e/install-action@0631aa6515c7d545823c67cfae7ef4fc7f490154 # v2.81.8
        with:
          tool: cargo-audit
      # RUSTSEC-2023-0071 (rsa "Marvin attack"): pulled in transitively via sqlx's
      # MySQL driver (a macro-time dependency) — unreachable in our Postgres-only
      # build, and no fixed upstream version exists. Drop this ignore once sqlx
      # removes the dependency or a fix ships.
      - run: cargo audit --ignore RUSTSEC-2023-0071

  web:
    name: Web (SPA)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      # Fail the build on known-vulnerable JS deps (high/critical only — low/moderate
      # advisories in dev-only tooling shouldn't block).
      - run: npm audit --omit=dev --audit-level=high

  # Continuous deployment: every green master push ships to Cloud Run.
  # Mirrors the manual runbook in deploy/README.md: build the image with Cloud
  # Build, run pending migrations via the fillerkiller-migrate Job, then patch
  # ONLY the app container (the service is multi-container — a plain
  # `gcloud run deploy` would drop the GMP metrics sidecar).
  #
  # Auth is keyless: GitHub's OIDC token is exchanged for the
  # fillerkiller-deploy@ service account through Workload Identity Federation
  # (pool `github`, restricted to this repository) — no long-lived key exists.
  deploy:
    name: Deploy (Cloud Run)
    needs: [api, web]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    # Serialize deploys; never cancel one mid-rollout.
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    permissions:
      contents: read
      # Required to mint the OIDC token for Workload Identity Federation.
      id-token: write
    env:
      IMAGE: us-east1-docker.pkg.dev/fillerkiller/cloud-run-source-deploy/fillerkiller-api:${{ github.sha }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: projects/799253626309/locations/global/workloadIdentityPools/github/providers/github
          service_account: fillerkiller-deploy@fillerkiller.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1
      # Surface auth failures plainly: `gcloud builds submit` wraps any 403 —
      # including a failed WIF token exchange — in a misleading bucket error.
      - name: Verify credentials
        run: |
          gcloud auth print-access-token > /dev/null && echo "token exchange OK"
          gcloud storage buckets describe gs://fillerkiller_cloudbuild --format="value(name)"
      # Submit async and poll: the deployer can read build state but not the
      # build-log bucket, and `gcloud builds submit` errors when it can't
      # stream logs even though the build itself is fine.
      - name: Build image (Cloud Build)
        run: |
          set -euo pipefail
          BUILD_ID=$(gcloud builds submit --async --format="value(id)" \
            --tag "$IMAGE" \
            --service-account=projects/fillerkiller/serviceAccounts/fillerkiller-build@fillerkiller.iam.gserviceaccount.com \
            --default-buckets-behavior=regional-user-owned-bucket .)
          echo "Cloud Build: $BUILD_ID"
          while :; do
            STATUS=$(gcloud builds describe "$BUILD_ID" --format="value(status)")
            echo "  $STATUS"
            case "$STATUS" in
              SUCCESS) break ;;
              QUEUED|PENDING|WORKING) ;;
              *) echo "build did not succeed: $STATUS"; exit 1 ;;
            esac
            sleep 20
          done
      # Migrations run BEFORE the new code serves traffic (read paths may
      # SELECT new columns). `sqlx migrate run` is idempotent — a no-op when
      # there's nothing pending.
      - name: Run migrations (Cloud Run Job)
        run: |
          gcloud run jobs update fillerkiller-migrate --region us-east1 --image "$IMAGE" --quiet
          gcloud run jobs execute fillerkiller-migrate --region us-east1 --wait
      - name: Roll out (app container only)
        run: |
          gcloud run services update fillerkiller-api --region us-east1 \
            --container app --image "$IMAGE" --quiet
      - name: Smoke check
        run: |
          curl -sf https://fillerkiller.app/health
          curl -sf https://fillerkiller.app/health/db

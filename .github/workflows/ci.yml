name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  api:
    name: API (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    env:
      # Compile against the committed .sqlx cache (deterministic); the live DB
      # below is only used to run the `integration`-gated sqlx::test at runtime.
      SQLX_OFFLINE: "true"
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: api
      - run: cargo build --locked
      - run: cargo clippy --all-targets --features integration -- -D warnings
      - run: cargo test --features integration
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      # RUSTSEC-2023-0071 (rsa "Marvin attack"): pulled in transitively via sqlx's
      # MySQL driver (a macro-time dependency) — unreachable in our Postgres-only
      # build, and no fixed upstream version exists. Drop this ignore once sqlx
      # removes the dependency or a fix ships.
      - run: cargo audit --ignore RUSTSEC-2023-0071

  web:
    name: Web (SPA)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      # Fail the build on known-vulnerable JS deps (high/critical only — low/moderate
      # advisories in dev-only tooling shouldn't block).
      - run: npm audit --omit=dev --audit-level=high
